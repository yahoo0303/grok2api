services:
  - type: web
    name: grok2api
    env: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE_ENABLED
        value: "false"
      - key: DATA_DIR
        value: /tmp/data
      - key: SERVER_STORAGE_TYPE
        value: local
      - key: SERVER_STORAGE_URL
        value: ""
      - key: SERVER_HOST
        value: 0.0.0.0
